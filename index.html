<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EverEcho AI</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
      }

      body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        background: #000;
        color: #b8b8b8;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
      }

      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
      }

      h1 {
        color: #e8e8e8;
        font-size: clamp(1.5rem, 4vw, 2.25rem);
        font-weight: 500;
        letter-spacing: 0.02em;
        text-align: center;
      }

      footer {
        padding: 32px 24px 40px;
        text-align: center;
        font-size: 13px;
        line-height: 1.9;
        color: #9a9a9a;
      }

      footer p + p {
        margin-top: 4px;
      }

      footer a {
        color: inherit;
        text-decoration: none;
      }

      footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>这是 everechoai 落地页</h1>
    </main>

    <footer>
      <p>
        模型名称: 阶跃大模型&nbsp;&nbsp;沪公网安备31010402333581&nbsp;&nbsp;备案号:
        Shanghai-JieYue-20231106&nbsp;&nbsp;沪ICP备2023019222号-3
      </p>
      <p>
        Copyright © 2023 上海阶跃星辰智能科技有限公司&nbsp;&nbsp;地址:
        上海市徐汇区云锦路701号30层
      </p>
    </footer>
  </body>
</html>
